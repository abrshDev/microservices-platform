syntax = "proto3";

package task;

// This path must match where we want the generated code to land
option go_package = "github.com/abrshDev/task-service/internal/transport/grpc/proto/task";

service TaskService {
  rpc CreateTask (CreateTaskRequest) returns (TaskResponse);
  rpc GetTask (GetTaskRequest) returns (TaskResponse);
}

message CreateTaskRequest {
  string user_id = 1;
  string title = 2;
  string description = 3;
}

message GetTaskRequest {
  string id = 1;
}

message TaskResponse {
  string id = 1;
  string user_id = 2;
  string title = 3;
  string description = 4;
  string status = 5;
}