syntax = "proto3";

package user;

option go_package = "github.com/abrshDev/user-service/internal/transport/grpc/proto";

// The UserService defines the operations available over gRPC
service UserService {
  
  rpc GetUser(GetUserRequest) returns (UserResponse);

   rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);

   rpc CheckUserStatus(CheckUserStatusRequest) returns (CheckUserStatusResponse);
}

// The request message containing the User UUID
message GetUserRequest {
  string id = 1;
}

// The response message containing the data needed by other services
message UserResponse {
  string id = 1;
  string username = 2;
  string email = 3;
  uint32 tenant_id = 4;
}


message DeleteUserRequest {
  string id = 1;
}

message DeleteUserResponse {
  string message = 1;
}

message CheckUserStatusRequest{
    string id = 1;
}

message CheckUserStatusResponse{
  bool is_active = 1;
  string role=2;
}