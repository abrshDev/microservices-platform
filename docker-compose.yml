services:
  db:
    image: postgres:15-alpine
    container_name: user-serviceDb
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5666:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 55s 

  user-service:
    build: ./user_service
    container_name: user-service-app
    env_file:
      - .env
    ports:
      - "8080:8080"
      - "50051:50051"
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - microservice-network

  task-db:
    image: postgres:15-alpine
    container_name: task-serviceDb
    environment:
      - POSTGRES_USER=${TASK_DB_USER}
      - POSTGRES_PASSWORD=${TASK_DB_PASSWORD}
      - POSTGRES_DB=${TASK_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - task_postgres_data:/var/lib/postgresql/data
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 45s

  task-service:
    build: ./task_service
    container_name: task-service-app
    env_file:
      - .env
    ports:
      - "8081:8081"
    depends_on:
      task-db:
        condition: service_healthy
      user-service:
        condition: service_started
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - microservice-network

  notification-db:
    image: postgres:15-alpine
    container_name: notification-serviceDb
    environment:
      - POSTGRES_USER=${NOTIFICATION_DB_USER}
      - POSTGRES_PASSWORD=${NOTIFICATION_DB_PASSWORD}
      - POSTGRES_DB=${NOTIFICATION_DB_NAME}
    ports:
      - "5436:5432"
    volumes:
      - notification_postgres_data:/var/lib/postgresql/data
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 10s
      retries: 10

  notification-service:
    build: ./notification_service
    container_name: notification-service-app
    env_file:
      - .env
    ports:
      - "8082:8082"
      - "50052:50052"
    depends_on:
      notification-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - microservice-network

  reporting-db:
    image: postgres:15-alpine
    container_name: reporting-db
    environment:
      - POSTGRES_USER=${REPORTING_DB_USER}
      - POSTGRES_PASSWORD=${REPORTING_DB_PASSWORD}
      - POSTGRES_DB=${REPORTING_DB_NAME}
    ports:
      - "5437:5432"
    volumes:
      - reporting_postgres_data:/var/lib/postgresql/data
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  reporting-service:
    build: ./reporting_service
    container_name: reporting-service-app
    env_file:
      - .env
    ports:
      - "8083:8083"
    depends_on:
      reporting-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - microservice-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - microservice-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG4J_ROOT_LOGLEVEL: ERROR
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

networks:
  microservice-network:
    driver: bridge

volumes:
  user_postgres_data:
  task_postgres_data:
  notification_postgres_data:
  reporting_postgres_data:
