version: '3.8'

services:
  # --- USER SERVICE INFRASTRUCTURE ---
  db: 
    image: postgres:15-alpine
    container_name: user-serviceDb
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=user_db
    ports:
      - "5432:5432" 
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    networks:
      - microservice-network

  user-service:
    build: ./user_service
    container_name: user-service-app
    env_file:
      - .env
    ports:
      - "8080:8080"   # REST API
      - "50051:50051" # gRPC Server
    depends_on:
      - db
    restart: on-failure
    networks:
      - microservice-network

  # --- TASK SERVICE INFRASTRUCTURE ---
  task-db:
    image: postgres:15-alpine
    container_name: task-serviceDb
    environment:
      - POSTGRES_USER=${TASK_DB_USER}
      - POSTGRES_PASSWORD=${TASK_DB_PASSWORD}
      - POSTGRES_DB=${TASK_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - task_postgres_data:/var/lib/postgresql/data
    networks:
      - microservice-network

  task-service:
    build: ./task_service
    container_name: task-service-app
    env_file:
      - .env
    environment:
      - USER_SERVICE_ADDR=user-service:50051
      - NOTIFICATION_SERVICE_ADDR=notification-service:50052 # Added discovery address
    depends_on:
      - task-db
      - user-service
      - notification-service # Now depends on the new service
    restart: on-failure
    networks:
      - microservice-network

  # --- NOTIFICATION SERVICE INFRASTRUCTURE ---
  notification-db:
    image: postgres:15-alpine
    container_name: notification-serviceDb
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=notification_db
    # No port mapping needed unless you want to access it from your host machine (e.g., 5434:5432)
    networks:
      - microservice-network

  notification-service:
    build: ./notification_service
    container_name: notification-service-app
    ports:
      - "8082:8082"   # Potential REST port if you add one
      - "50052:50052" # gRPC Server port
    depends_on:
      - notification-db
    restart: on-failure
    networks:
      - microservice-network

networks:
  microservice-network:
    driver: bridge

volumes:
  user_postgres_data:
  task_postgres_data:
  notification_postgres_data: # Added volume for notification data