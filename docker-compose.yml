version: '3.8'

services:
  # --- USER SERVICE INFRASTRUCTURE ---
  db: 
    image: postgres:15-alpine
    container_name: user-serviceDb
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=user_db
    ports:
      - "5432:5432" 
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    networks:
      - microservice-network

  user-service:
    build: ./user_service
    container_name: user-service-app
    env_file:
      - .env
    ports:
      - "8080:8080"
      - "50051:50051"
    depends_on:
      - db
    restart: on-failure
    networks:
      - microservice-network

  # --- TASK SERVICE INFRASTRUCTURE ---
  task-db:
    image: postgres:15-alpine
    container_name: task-serviceDb
    environment:
      - POSTGRES_USER=${TASK_DB_USER}
      - POSTGRES_PASSWORD=${TASK_DB_PASSWORD}
      - POSTGRES_DB=${TASK_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - task_postgres_data:/var/lib/postgresql/data
    networks:
      - microservice-network

  task-service:
    build: ./task_service
    container_name: task-service-app
    env_file:
      - .env
    environment:
      - USER_SERVICE_ADDR=user-service:50051
      - NOTIFICATION_SERVICE_ADDR=notification-service:50052
    ports:
      - "8081:8081" # FIXED: Restored explicit port mapping
    depends_on:
      - task-db
      - user-service
      - notification-service
    restart: on-failure
    networks:
      - microservice-network

  # --- NOTIFICATION SERVICE INFRASTRUCTURE ---
  notification-db:
    image: postgres:15-alpine
    container_name: notification-serviceDb
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=notification_db
    networks:
      - microservice-network

  notification-service:
    build: ./notification_service
    container_name: notification-service-app
    ports:
      - "8082:8082"
      - "50052:50052"
    depends_on:
      - notification-db
    restart: on-failure
    networks:
      - microservice-network
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - microservice-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - microservice-network

networks:
  microservice-network:
    driver: bridge

volumes:
  user_postgres_data:
  task_postgres_data:
  notification_postgres_data: