version: '3.8'

services:
  # --- USER SERVICE 
  db: 
    image: postgres:15-alpine
    container_name: user-serviceDb
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=user_db
    ports:
      - "5432:5432" 
    volumes:
      - user_postgres_data:/var/lib/postgresql/data

  user-service:
    build: ./user_service
    container_name: user-service-app
    env_file:
      - .env
    ports:
      - "8080:8080"
      - "50051:50051"
    depends_on:
      - db
    restart: on-failure

  # --- TASK SERVICE 
  task-db:
    image: postgres:15-alpine
    container_name: task-serviceDb
    environment:
      - POSTGRES_USER=${TASK_DB_USER}
      - POSTGRES_PASSWORD=${TASK_DB_PASSWORD}
      - POSTGRES_DB=${TASK_DB_NAME}
    ports:
      - "5433:5432" # External 5433 to avoid conflict with User DB
    volumes:
      - task_postgres_data:/var/lib/postgresql/data

  task-service:
    build: ./task_service
    container_name: task-service-app
    env_file:
      - .env
    ports:
      - "${TASK_APP_PORT}:8081" 
    depends_on:
      - task-db
    restart: on-failure

volumes:
  user_postgres_data:
  task_postgres_data: # Separate volume for Task data